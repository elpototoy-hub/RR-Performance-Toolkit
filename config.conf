# RR-Performance-Toolkit Configuration File
# Edit this file to customize toolkit behavior

################################################################################
# Monitoring Settings
################################################################################

# Monitoring interval (seconds)
MONITOR_INTERVAL=5

# Monitoring duration (seconds)
MONITOR_DURATION=3600

################################################################################
# Battery Settings
################################################################################

# Battery alert threshold (%)
BATTERY_ALERT_THRESHOLD=20

# Battery drain warning (%/hour)
BATTERY_DRAIN_WARNING=5

################################################################################
# Thermal Settings
################################################################################

# Thermal warning temperature (°C)
THERMAL_WARNING=45

# Thermal critical temperature (°C)
THERMAL_CRITICAL=55

################################################################################
# Performance Profiles
################################################################################

# Default performance profile
DEFAULT_PROFILE="balanced"

# Auto-optimize on launch
AUTO_OPTIMIZE=false

################################################################################
# Output Settings
################################################################################

# Log level (debug, info, warning, error)
LOG_LEVEL="info"

# Log file location
LOG_FILE="~/.local/share/rr-toolkit/logs/toolkit.log"

# Output format (text, json, csv)
OUTPUT_FORMAT="text"

################################################################################
# Advanced Settings
################################################################################

# Enable verbose output
VERBOSE=false

# Max log file size (MB)
MAX_LOG_SIZE=100

# Auto-cleanup logs older than (days)
LOG_RETENTION_DAYS=30
